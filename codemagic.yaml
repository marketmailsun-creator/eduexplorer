workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic Deploy Key
    environment:
      node: 22.0.0
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ai.eduexplorer.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
    scripts:
      - name: Install Node dependencies
        script: npm ci
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build iOS release
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/eduexplorer.xcarchive \
            archive
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      groups:
        - google_play
      node: 22.0.0
      java: 21
      android_signing:
        - eduexplorer
      vars:
        PACKAGE_NAME: "ai.eduexplorer.app"
    scripts:
      - name: Install Node dependencies
        script: npm ci
      - name: Set up signing properties
        script: |
          echo "EDUEXPLORER_STORE_FILE=$CM_KEYSTORE_PATH" >> android/gradle.properties
          echo "EDUEXPLORER_STORE_PASSWORD=$CM_KEYSTORE_PASSWORD" >> android/gradle.properties
          echo "EDUEXPLORER_KEY_ALIAS=$CM_KEY_ALIAS" >> android/gradle.properties
          echo "EDUEXPLORER_KEY_PASSWORD=$CM_KEY_PASSWORD" >> android/gradle.properties
      - name: Capacitor sync
        script: npx cap sync android
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
      - name: Build Android release AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true